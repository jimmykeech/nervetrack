# NerveTrack frontend — SvelteKit (adapter-node).
#
# PUBLIC app: this is the only thing exposed to the internet. It serves the UI
# and proxies /api/* to the backend over the private network (see hooks.server.ts).
# It is stateless, so it can scale to zero and auto-start on the next request.
#
# Served publicly at https://nervetrack.jameskeech.io (custom domain mapped onto
# this app — see docs/DEPLOY-FLY.md). Rename `app` below if "nervetrack-frontend"
# is taken globally; the public domain is independent of the app name.

app = "nervetrack-frontend"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  # Private 6PN address of the backend app. Change the hostname if you renamed
  # the backend app (it is always <backend-app-name>.internal).
  BACKEND_URL = "http://nervetrack-backend.internal:8000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/login"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
