name: CI

# Runs on every PR and on pushes to main. Keeps main always-releasable.
# Image publishing is separate and happens on v* tags (see release.yml).
on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --upgrade pip && pip install '.[dev]'
      - run: ruff check .
      - run: pytest

  frontend:
    name: Frontend (lint + check + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run check
      - run: npm test
