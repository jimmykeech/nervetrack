name: Deploy to Fly.io

# Deploys are deliberate: pushing a v* tag ships both apps (backend first — it
# owns the DB and runs migrations — then frontend). Cut a tag from green main:
#   git tag v0.2.0 && git push origin v0.2.0
# Or run manually from the Actions tab (workflow_dispatch).
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

concurrency:
  group: fly-deploy
  cancel-in-progress: false

jobs:
  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # Strategy is "immediate" (see backend/fly.toml) because the single
      # machine + attached volume can't be rolled; that avoids the health-check
      # wait that used to time out. Brief downtime per deploy is expected.
      - name: Deploy backend
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only

  deploy-frontend:
    name: Deploy frontend
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # Frontend is stateless, so flyctl rolls it cleanly. Let a real failure surface.
      - name: Deploy frontend
        working-directory: frontend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only
      # End-to-end check: a healthy, reachable backend answers 401 (not signed in)
      # through the freshly deployed frontend proxy.
      - name: Smoke test
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 \
            https://nervetrack.jameskeech.io/api/v1/auth/me || echo 000)
          echo "GET /api/v1/auth/me -> $code (expect 401)"
          test "$code" = "401"
