# NerveTrack backend — FastAPI + DuckDB.
#
# PRIVATE app: it has no public HTTP service, so it is only reachable from the
# frontend over Fly's 6PN private network at http://nervetrack-backend.internal:8000.
# DuckDB is single-writer, so this app runs as exactly ONE always-on machine
# bound to one persistent volume. Do not scale it past 1.
#
# Rename `app` below if "nervetrack-backend" is taken globally — and update the
# BACKEND_URL in frontend/fly.toml to match (<app-name>.internal).

app = "nervetrack-backend"
primary_region = "syd"

# One machine + an attached volume can't be rolled (the volume can't live on two
# machines at once), so the default "rolling" strategy updates in place and then
# hangs in a health-check wait that intermittently times out ("request canceled").
# "immediate" stops and replaces the single machine all at once with no health
# gate — a few seconds of downtime per deploy in exchange for a clean, reliable
# release in both CI and the Fly dashboard.
[deploy]
  strategy = "immediate"

[build]
  dockerfile = "Dockerfile"

[env]
  NERVETRACK_DB_PATH = "/data/nervetrack.duckdb"
  NERVETRACK_TIMEZONE = "Australia/Sydney"
  # Served over HTTPS in prod, so the session cookie must be Secure.
  NERVETRACK_COOKIE_SECURE = "true"
  # Public URLs are the FRONTEND's domain (the browser only ever talks to the
  # frontend, which proxies /api to here).
  NERVETRACK_FRONTEND_URL = "https://nervetrack.jameskeech.io"
  NERVETRACK_OAUTH_REDIRECT_URI = "https://nervetrack.jameskeech.io/api/v1/auth/google/callback"
  NERVETRACK_CORS_ORIGINS = '["https://nervetrack.jameskeech.io"]'
  # Invite list — not secret, but you can move it to `fly secrets` if you prefer.
  # NERVETRACK_ALLOWED_EMAILS is set via `fly secrets set` (see docs/DEPLOY-FLY.md).

# The DuckDB file. One volume, one machine.
[mounts]
  source = "nervetrack_data"
  destination = "/data"

# No [http_service] on purpose: keeps the backend off the public internet.
# Health is checked on the machine's private port instead.
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[checks.health]
  type = "http"
  port = 8000
  method = "get"
  path = "/healthz"
  interval = "15s"
  timeout = "2s"
  grace_period = "10s"
