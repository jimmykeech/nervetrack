# Production-style stack. One command brings up backend + frontend:
#   docker compose up --build
#
# For hot-reload development, layer the dev override:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  backend:
    build: ./backend
    # Bind IPv4 for local self-hosting: the frontend's Node fetch reaches
    # `backend:8000` over IPv4 (Docker DNS). Fly's 6PN (IPv6) is handled by the
    # image's own entrypoint.sh (`--host ::`), which this override replaces here.
    entrypoint: ['uvicorn', 'app.main:app', '--host', '0.0.0.0', '--port', '8000']
    environment:
      NERVETRACK_DB_PATH: /data/nervetrack.db
      NERVETRACK_TIMEZONE: ${NERVETRACK_TIMEZONE:-UTC}
      NERVETRACK_WEEK_START_DAY: ${NERVETRACK_WEEK_START_DAY:-0}
      NERVETRACK_CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
      # Auth mode: none (single local user, no login) | password | google.
      NERVETRACK_AUTH_MODE: ${NERVETRACK_AUTH_MODE:-none}
      NERVETRACK_ALLOW_REGISTRATION: ${NERVETRACK_ALLOW_REGISTRATION:-true}
      # Google OAuth (only used when NERVETRACK_AUTH_MODE=google):
      NERVETRACK_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      NERVETRACK_GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      NERVETRACK_OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI:-http://localhost:3000/api/v1/auth/google/callback}
      NERVETRACK_FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      NERVETRACK_ALLOWED_EMAILS: ${ALLOWED_EMAILS:-}
      NERVETRACK_SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
      NERVETRACK_COOKIE_SECURE: ${COOKIE_SECURE:-false}
      # Phase 2 AI: encrypts per-user LLM API keys at rest. Required before a
      # user can store a provider key (per-user keys are set in the app UI).
      NERVETRACK_SECRET_KEY: ${NERVETRACK_SECRET_KEY:-}
    volumes:
      - nervetrack-data:/data
    ports:
      - '8000:8000'
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build: ./frontend
    environment:
      BACKEND_URL: http://backend:8000
      PORT: '3000'
    ports:
      - '3000:3000'
    depends_on:
      backend:
        condition: service_healthy

volumes:
  nervetrack-data:
